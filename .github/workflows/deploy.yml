name: Test, Migrate & Deploy

on:
  push:
    branches: [main]

jobs:
  test-api:
    if: github.repository == 'AdamBrutsaert/trinity'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: apps/api
        run: bun install

      - name: Pull required images
        run: |
          docker pull postgres@sha256:c2820d612da95f7e03f07785878a4de220a53aaaeea351f0f2fa0a4a72ec4e50

      - name: Run tests
        working-directory: apps/api
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          cp .env.test .env
          bun test --timeout 50000 --coverage

  test-mobile:
    if: github.repository == 'AdamBrutsaert/trinity'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: apps/mobile
        run: bun install

      - name: Run tests
        working-directory: apps/mobile
        run: bunx jest --coverage

  build:
    needs:
      - test-api
      - test-mobile
    if: github.repository == 'AdamBrutsaert/trinity'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docker images
        run: docker compose build

      - name: Tag and push API image
        run: |
          docker tag trinity-api:latest ${IMAGE_NAME}:${IMAGE_TAG}
          docker push ${IMAGE_NAME}:${IMAGE_TAG}
        env:
          IMAGE_NAME: ghcr.io/adambrutsaert/trinity-api
          IMAGE_TAG: latest

  migrate:
    needs: build
    if: github.repository == 'AdamBrutsaert/trinity'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: apps/api
        run: bun install

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run migrate

  deploy:
    needs: migrate
    if: github.repository == 'AdamBrutsaert/trinity'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Deploy project to Vercel
        run: bunx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
